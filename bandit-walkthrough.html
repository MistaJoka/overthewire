<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandit // Walkthrough</title>
<style>
  :root{
    --bg:#100e0c;--surface:#1a1714;--surface2:#221d18;--line:#332c25;
    --text:#d8cfbe;--muted:#8a7f6e;--amber:#f0a830;--amber-dim:#b87d28;
    --teal:#6bb3a0;--done:#7fc77f;--red:#d98b6a;--code:#ead9b8;
    --mono:'JetBrains Mono','Fira Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
    --side:308px;
  }
  :root[data-theme="light"]{
    --bg:#f5f0e6;--surface:#ece4d5;--surface2:#e1d7c4;--line:#cebfa4;
    --text:#382f24;--muted:#786c56;--amber:#a5620c;--amber-dim:#855012;
    --teal:#2c7461;--done:#3c9350;--red:#a8492a;--code:#ead9b8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);line-height:1.55;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}
  ::selection{background:rgba(240,168,48,.25)}

  /* mobile bar */
  .mbar{display:none;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--line);background:var(--surface)}
  .mbar button{background:var(--surface2);border:1px solid var(--line);color:var(--amber);font-family:var(--mono);font-size:12px;padding:6px 12px;border-radius:7px;cursor:pointer}
  .mbar span{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  .app{flex:1;display:flex;min-height:0}

  /* ---------- sidebar ---------- */
  .side{width:var(--side);flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;background:var(--surface)}
  .side-head{padding:18px 18px 14px;border-bottom:1px solid var(--line)}
  .brand{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .brand span{color:var(--amber)}
  .pbar{margin-top:12px;height:6px;background:var(--surface2);border:1px solid var(--line);border-radius:99px;overflow:hidden}
  .pbar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber-dim),var(--amber));transition:width .4s}
  .pmeta{margin-top:8px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px}
  .pmeta b{color:var(--amber);font-size:12px}
  .pmeta button{margin-left:auto;background:none;border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer}
  .pmeta button:hover{border-color:var(--red);color:var(--red)}
  .side-tabs{display:flex;gap:6px;padding:12px 14px 0}
  .stab{flex:1;background:var(--surface2);border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:11.5px;padding:7px 0;border-radius:7px;cursor:pointer;text-transform:lowercase}
  .stab:hover{color:var(--text)}
  .stab.on{background:var(--amber);color:#1a1208;border-color:var(--amber);font-weight:700}
  .side-search{margin:12px 14px 8px;background:var(--bg);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 11px;border-radius:7px}
  .side-search:focus{outline:none;border-color:var(--amber)}.side-search::placeholder{color:var(--muted)}
  .navlist{flex:1;overflow-y:auto;padding:2px 10px 16px}
  .nores{color:var(--muted);font-size:12px;padding:16px 8px;text-align:center}
  .lrow{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;border-left:2px solid transparent;
    color:var(--muted);font-family:var(--mono);font-size:12.5px;padding:8px 10px;border-radius:6px;cursor:pointer;transition:.12s}
  .lrow:hover{background:var(--surface2);color:var(--text)}
  .lrow.active{background:var(--surface2);color:var(--text);border-left-color:var(--amber)}
  .ldot{width:8px;height:8px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--line);flex-shrink:0}
  .lrow.done .ldot{background:var(--done);border-color:var(--done)}
  .lrow.next .ldot{border-color:var(--amber);box-shadow:0 0 0 3px rgba(240,168,48,.15)}
  .ldot.tool{border-color:var(--teal)}
  .lnum{color:var(--amber-dim);font-size:11px;font-weight:700;flex-shrink:0;width:20px}
  .lrow.done .lnum{color:var(--done)}
  .lrow.active .lnum{color:var(--amber)}
  .ltxt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* ---------- detail ---------- */
  .detail{flex:1;overflow-y:auto;min-height:0}
  .dwrap{max-width:760px;margin:0 auto;padding:30px 34px 90px}
  .dnav{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .dbtn{background:var(--surface);border:1px solid var(--line);color:var(--text);font-family:var(--mono);font-size:11.5px;padding:6px 12px;border-radius:7px;cursor:pointer}
  .dbtn:hover:not(:disabled){border-color:var(--amber);color:var(--amber)}
  .dbtn:disabled{opacity:.35;cursor:default}
  .dcrumb{margin:0 auto;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
  .dhead{display:flex;align-items:flex-start;gap:16px;margin-bottom:14px}
  .dh1{font-size:clamp(22px,4vw,32px);font-weight:800;letter-spacing:-.02em;line-height:1.1;display:flex;align-items:baseline;gap:12px}
  .dhnum{font-size:.8em;color:var(--amber)}
  .dhead.done .dhnum{color:var(--done)}
  .chk{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;padding-top:8px}
  .chk input{accent-color:var(--done);width:16px;height:16px;cursor:pointer}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
  .tag{font-size:10.5px;color:var(--teal);border:1px solid rgba(107,179,160,.3);padding:2px 9px;border-radius:99px}
  .goal{font-size:14px;line-height:1.6;margin-bottom:20px}
  .goal .lab{color:var(--amber);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:5px}
  .goal code,.hint code{background:var(--surface2);color:var(--teal);padding:1px 5px;border-radius:4px;font-size:.9em}

  .reveals{display:flex;flex-direction:column;gap:9px}
  .rbtn{align-self:flex-start;background:var(--surface2);border:1px solid var(--line);color:var(--amber);font-family:var(--mono);font-size:12px;padding:7px 14px;border-radius:7px;cursor:pointer;transition:.15s}
  .rbtn:hover{border-color:var(--amber)}
  .panel{display:none}.panel.show{display:block}
  .hint{font-size:13px;color:var(--muted);border-left:2px solid var(--amber-dim);padding:8px 0 8px 14px;font-style:italic}

  .phase{margin-top:14px}.phase:first-child{margin-top:2px}
  .plabel{display:flex;align-items:center;gap:9px;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .plabel .dot{width:19px;height:19px;border-radius:50%;border:1px solid var(--amber-dim);color:var(--amber);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-style:normal}
  .phase.connect .plabel .dot,.phase.advance .plabel .dot{border-color:var(--teal);color:var(--teal)}
  .phase.capture .plabel{color:var(--amber)}
  ol.steps{list-style:none;counter-reset:s;margin:0 0 0 9px;padding:0}
  ol.steps > li{counter-increment:s;position:relative;padding:0 0 12px 26px;margin:0}
  ol.steps > li::before{content:counter(s);position:absolute;left:0;top:1px;width:18px;height:18px;border:1px solid var(--line);color:var(--muted);border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700}
  ol.steps > li:not(:last-child)::after{content:'';position:absolute;left:9px;top:20px;bottom:0;width:1px;background:var(--line)}
  .single{margin-left:9px}
  .snote{font-size:13px;line-height:1.55}
  .snote code,.cap code{background:var(--surface2);color:var(--teal);padding:1px 5px;border-radius:4px;font-size:11.5px}
  .cmdbox{position:relative;background:#0c0a08;border:1px solid var(--line);border-radius:7px;padding:11px 48px 11px 14px;font-size:12.5px;color:var(--code);overflow-x:auto;white-space:pre-wrap;word-break:break-word;margin-top:8px}
  .copy{position:absolute;top:8px;right:8px;background:var(--surface2);border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:5px;cursor:pointer}
  .copy:hover{color:var(--amber);border-color:var(--amber-dim)}
  .cap{font-size:13px;line-height:1.55;background:rgba(240,168,48,.06);border:1px solid rgba(240,168,48,.25);border-radius:7px;padding:10px 13px}
  .cap b{color:var(--amber)}
  .concept{margin-top:16px;background:var(--surface2);border:1px solid var(--line);border-left:3px solid var(--teal);border-radius:7px;padding:12px 14px;font-size:13px;line-height:1.55}
  .concept .lab{color:var(--teal);font-size:10px;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:5px}
  .concept code{background:var(--bg);color:var(--teal);padding:1px 5px;border-radius:4px;font-size:11.5px}
  .gotcha{margin-top:9px;font-size:12.5px;color:var(--red);border-left:3px solid var(--red);padding:8px 0 8px 14px;background:rgba(217,139,106,.05)}
  .gotcha .lab{font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:.1em;margin-right:6px}
  .gotcha code{background:var(--surface2);padding:1px 5px;border-radius:4px}

  .notes-wrap{margin-top:26px;padding-top:20px;border-top:1px solid var(--line)}
  .nlab{color:var(--teal);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
  .notebox{width:100%;min-height:90px;background:#0c0a08;border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;line-height:1.5;padding:12px 14px;resize:vertical}
  .notebox:focus{outline:none;border-color:var(--teal)}.notebox::placeholder{color:var(--muted)}

  /* tool detail */
  .tdesc{font-size:14px;line-height:1.6;margin:6px 0 20px}
  .flagtable{display:flex;flex-direction:column;gap:7px;margin-bottom:22px}
  .frow{display:flex;gap:12px;font-size:13px;align-items:baseline}
  .frow code{background:#0c0a08;color:var(--amber);padding:3px 9px;border-radius:6px;min-width:120px;text-align:center;flex-shrink:0;font-size:11.5px}
  .frow span{color:var(--muted);line-height:1.5}
  .usedlab{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
  .usedchips{display:flex;gap:7px;flex-wrap:wrap}
  .uchip{background:var(--surface2);border:1px solid var(--line);color:var(--text);font-size:11.5px;padding:3px 10px;border-radius:99px;cursor:pointer}
  .uchip:hover{border-color:var(--amber);color:var(--amber)}
  .kbdhint{margin-top:30px;font-size:11px;color:var(--muted)}
  .kbdhint kbd{background:var(--surface2);border:1px solid var(--line);border-radius:4px;padding:1px 6px;font-size:10.5px}

  /* side controls */
  .side-ctrls{display:flex;gap:6px;padding:10px 14px 0}
  .ctrl{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;background:var(--surface2);border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-size:10.5px;padding:6px 0;border-radius:7px;cursor:pointer;transition:.12s}
  .ctrl:hover{color:var(--text);border-color:var(--amber-dim)}
  .ctrl.on{color:var(--amber);border-color:var(--amber-dim)}

  /* copy-all-script button */
  .copyall{align-self:flex-start;margin-top:14px;background:#0c0a08;border:1px solid var(--line);color:var(--amber);font-family:var(--mono);font-size:11.5px;padding:7px 14px;border-radius:7px;cursor:pointer}
  .copyall:hover{border-color:var(--amber)}

  /* tool real-world note */
  .treal{margin:2px 0 22px;background:var(--surface2);border:1px solid var(--line);border-left:3px solid var(--amber-dim);border-radius:7px;padding:11px 13px;font-size:12.5px;line-height:1.55;color:var(--text)}
  .treal .lab{color:var(--amber);font-size:10px;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:5px}
  .treal code{background:var(--bg);color:var(--amber);padding:1px 5px;border-radius:4px;font-size:11.5px}

  /* ---------- in-page terminal ---------- */
  .term{display:flex;flex-direction:column;background:#0c0a08;border:1px solid var(--line);border-radius:8px;
    font-family:var(--mono);font-size:13px;color:var(--text);overflow:hidden;height:100%;min-height:260px}
  .term-scroll{flex:1;overflow-y:auto;padding:12px 14px;white-space:pre-wrap;word-break:break-word}
  .term-line{line-height:1.5}
  .term-line.term-err{color:var(--red)}
  .term-line.term-ok{color:var(--done)}
  .term-prompt{color:var(--teal);white-space:pre}
  .term-inputline{display:flex;align-items:baseline;padding:0 14px 12px;white-space:pre-wrap;word-break:break-word}
  .term-typed{color:var(--code);white-space:pre-wrap;word-break:break-word}
  .term-cursor{display:inline-block;width:.58em;height:1.05em;background:var(--amber);margin-left:1px;
    vertical-align:text-bottom;animation:term-blink 1s step-end infinite}
  @keyframes term-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  .term-hidden-input{width:1px;height:1px;padding:0;border:0;opacity:0;background:transparent;color:transparent;
    caret-color:transparent}

  /* drill / practice mode */
  .drill{max-width:640px;margin:0 auto;padding:34px 34px 90px}
  .drill-top{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .drill-top .dcrumb{margin:0}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:24px 24px 22px;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--amber),var(--teal))}
  .card-lvl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:13px}
  .card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:15px}
  .card-q{font-size:16px;line-height:1.55}
  .card-hint{font-size:12.5px;color:var(--muted);font-style:italic;border-left:2px solid var(--amber-dim);padding:6px 0 6px 12px;margin:14px 0 0}
  .prompt{font-size:12px;color:var(--muted);margin:18px 0 4px;text-align:center;letter-spacing:.04em}
  .card-a{margin-top:16px;border-top:1px dashed var(--line);padding-top:16px}
  .card-a.hidden{display:none}
  .drill-btns{display:flex;gap:10px;margin-top:18px}
  .drill-btns button{flex:1;font-family:var(--mono);font-size:12.5px;padding:11px 0;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--surface2);color:var(--text);transition:.12s}
  .db-reveal{color:var(--amber)!important;border-color:var(--amber-dim)!important}
  .db-hit:hover{border-color:var(--done)!important;color:var(--done)!important}
  .db-miss:hover{border-color:var(--red)!important;color:var(--red)!important}
  .drill-stats{padding:14px 12px}
  .dstat{display:flex;justify-content:space-between;align-items:baseline;font-size:11.5px;color:var(--muted);padding:10px 12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;background:var(--surface2)}
  .dstat b{font-size:20px;color:var(--amber);font-weight:800}
  .dstat.streak b{color:var(--done)}

  @media print{
    .side,.mbar,.scrim,.dnav,.reveals .rbtn,.chk,.side-ctrls,.notes-wrap,.kbdhint,.copy,.copyall{display:none!important}
    body,.app,.detail{display:block;overflow:visible;height:auto}
    .panel{display:block!important}
    body{background:#fff;color:#000}
    .cmdbox{background:#f4f4f4;color:#000;border:1px solid #ccc}
    .dwrap{max-width:none}
  }

  @media(max-width:760px){
    .mbar{display:flex}
    .side{position:fixed;top:0;bottom:0;left:0;z-index:40;transform:translateX(-100%);transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.5)}
    .side.open{transform:none}
    .dwrap{padding:22px 18px 80px}
    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30;display:none}
    .scrim.show{display:block}
  }
</style>
</head>
<body>
  <div class="mbar">
    <button id="menuBtn">☰ menu</button>
    <span id="mtitle"></span>
  </div>
  <div class="app">
    <aside class="side" id="side">
      <div class="side-head">
        <div class="brand">bandit <span>//</span> walkthrough</div>
        <div class="pbar"><i id="barFill"></i></div>
        <div class="pmeta"><b id="doneN">0</b>/33 cleared<button id="resetBtn">reset</button></div>
      </div>
      <div class="side-tabs">
        <button class="stab on" data-v="levels">levels</button>
        <button class="stab" data-v="commands">commands</button>
        <button class="stab" data-v="drill">drill</button>
      </div>
      <div class="side-ctrls">
        <button class="ctrl" id="themeBtn">◐ theme</button>
        <button class="ctrl" id="spoilBtn">👁 reveal all</button>
      </div>
      <input class="side-search" id="search" placeholder="filter…">
      <nav class="navlist" id="navlist"></nav>
    </aside>
    <div class="scrim" id="scrim"></div>
    <main class="detail" id="detail"></main>
  </div>
<script src="js/data.js"></script>
<script src="js/vfs.js"></script>
<script src="js/shell.js"></script>
<script src="js/term.js"></script>
<script src="js/app.js"></script>
</body>
</html>
